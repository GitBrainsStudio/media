<main class="page">
  <div class="page-section">
    <app-header></app-header>
  </div>

  <section id="posts" class="container page-section page-section--mobile">
    <h1 class="page-section__title">Заметки 💪</h1>
    <p class="page-section__description">
      Иногда сюда даже что-то добавляется.
    </p>
    <div class="page-section__content">
      <app-category-collection
        [categories]="categories"></app-category-collection>
    </div>
  </section>

  <section id="projects" class="container page-section page-section--mobile">
    <h1 class="page-section__title">Свободное время 👌</h1>
    <p class="page-section__description">
      Маленькая часть из непонятной кучи репозиториев. Пока оставляем.
    </p>
    <div class="page-section__content">
      <app-project-preview-card-collection
        [projects]="projects"></app-project-preview-card-collection>
    </div>
  </section>
</main>
<app-footer [postCount]="postCount" [projectCount]="projectCount"></app-footer>
