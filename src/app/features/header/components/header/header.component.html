<header class="header">
    <div class="container header__row">
        <div class="header__logo">
            <div class="header__column header__column--home-link" [routerLink]="['/']">
                <img src="assets/images/logo.jpg" alt="Это я (:" class="header__avatar">
            </div>
            <div class="header__column">
                <div class="header__title">Nikolay | Software Developer </div>
                <div class="header__title header__title--mobile">Nikolay</div>
                <div class="header__text">Разработка программного обеспечения</div>
            </div>
        </div>
        <div class="header__contacts">
            <a href="https://github.com/GitBrainsStudio" class="header__contact text-link text-link--blue">GitHub</a>
            <a href="mailto:gitbrains@gmail.com" class="header__contact text-link text-link--blue">Почта</a>
            <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="isDark ? 'Светлая тема' : 'Тёмная тема'">
                <svg *ngIf="!isDark" class="theme-toggle__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <svg *ngIf="isDark" class="theme-toggle__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
        </div>
    </div>
</header>
