<header class="header">
    <div class="container header__row">
        <div class="header__logo">
            <div class="header__column header__column--home-link" [routerLink]="['/']">
                <img src="assets/images/logo.jpg" alt="Это я (:" class="header__avatar">
            </div>
            <div class="header__column">
                <div class="header__title">Nikolay | Software Developer </div>
                <div class="header__title header__title--mobile">Nikolay</div>
                <div class="header__text">Разработка программного обеспечения</div>
            </div>
        </div>
        <div class="header__contacts">
            <a href="https://github.com/GitBrainsStudio" class="header__icon-link" target="_blank" aria-label="GitHub">
                <i class="fab fa-github header__icon"></i>
            </a>
            <a href="mailto:gitbrains@gmail.com" class="header__icon-link" aria-label="Почта">
                <i class="fas fa-envelope header__icon"></i>
            </a>
            <button class="header__icon-btn" (click)="toggleTheme()" [attr.aria-label]="isDark ? 'Светлая тема' : 'Тёмная тема'">
                <i *ngIf="!isDark" class="fas fa-moon header__icon"></i>
                <i *ngIf="isDark" class="fas fa-sun header__icon"></i>
            </button>
        </div>
    </div>
</header>
