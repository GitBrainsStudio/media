<nav class="bottom-bar">
  <a class="bottom-bar__item" routerLink="/" (click)="scrollToTop()">
    <svg class="bottom-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 0 0 1 1h3m10-11l2 2m-2-2v10a1 1 0 0 1-1 1h-3m-6 0a1 1 0 0 0 1-1v-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v4a1 1 0 0 0 1 1m-6 0h6"/>
    </svg>
    <span class="bottom-bar__label">Главная</span>
  </a>
  <a class="bottom-bar__item" routerLink="/" (click)="scrollTo('posts')">
    <svg class="bottom-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
    </svg>
    <span class="bottom-bar__label">Статьи</span>
    <span class="bottom-bar__badge" *ngIf="postCount > 0">{{ postCount }}</span>
  </a>
  <a class="bottom-bar__item" routerLink="/" (click)="scrollTo('projects')">
    <svg class="bottom-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="2" y="3" width="20" height="14" rx="2"/>
      <line x1="8" y1="21" x2="16" y2="21"/>
      <line x1="12" y1="17" x2="12" y2="21"/>
    </svg>
    <span class="bottom-bar__label">Проекты</span>
    <span class="bottom-bar__badge" *ngIf="projectCount > 0">{{ projectCount }}</span>
  </a>
</nav>

<footer class="footer">
  <div class="container footer__row">
    @GitBrainsStudio
    <div class="footer__contacts">
      <a class="footer__contact text-link text-link--blue" href="https://github.com/GitBrainsStudio">GitHub</a>
      <a class="footer__contact text-link text-link--blue" href="mailto:gitbrains@gmail.com">Почта</a>
    </div>
  </div>
</footer>
